<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In to MeraEhsaas</title>
</head>
<body style="margin:0;padding:0;background:#fdfcfb;font-family:'Georgia',serif;">
  <div style="max-width:560px;margin:40px auto;padding:40px;background:#fff;border-radius:16px;border:1px solid #f5ede4;">
    <div style="text-align:center;margin-bottom:32px;">
      <h1 style="font-size:28px;color:#2e2320;margin:0;">MeraEhsaas</h1>
    </div>
    <h2 style="font-size:20px;color:#57443c;margin-bottom:16px;">Sign In</h2>
    <p style="font-size:15px;color:#6a5147;line-height:1.7;">
      Click the button below to sign in to your MeraEhsaas account.
      This link is valid for 1 hour.
    </p>
    <div style="text-align:center;margin:32px 0;">
      <a href="{{ .ConfirmationURL }}" style="background:#6a5147;color:#fff;padding:12px 28px;border-radius:12px;text-decoration:none;font-size:14px;font-weight:600;">
        Sign In to MeraEhsaas
      </a>
    </div>
    <p style="font-size:13px;color:#bfa592;line-height:1.6;">
      If you did not request this email, you can safely ignore it.
    </p>
    <p style="font-size:12px;color:#bfa592;text-align:center;margin-top:32px;">
      &copy; MeraEhsaas. All rights reserved.
    </p>
  </div>
</body>
</html>
